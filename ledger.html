<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fundamental 班表</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700&family=Noto+Sans+TC:wght@400;500;700&family=IBM+Plex+Mono:wght@500;600&display=swap');

:root{
  --ink:#1E2A38;
  --ink-soft:#5A6B7D;
  --paper:#F7F1E4;
  --card:#FFFCF5;
  --brass:#B8863E;
  --brass-deep:#8C6529;
  --teal:#3F6B5E;
  --brick:#A8412B;
  --line:#DED0A8;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  background:var(--paper);
  color:var(--ink);
  font-family:'Noto Sans TC','Noto Sans',sans-serif;
  -webkit-font-smoothing:antialiased;
}

.wrap{
  max-width:480px;
  margin:0 auto;
  padding:18px 14px 40px;
}

/* header */
header{
  position:sticky;
  top:0;
  z-index:5;
  background:var(--paper);
  padding-bottom:10px;
  margin-bottom:6px;
}
.eyebrow{
  font-family:'IBM Plex Mono',monospace;
  font-size:10.5px;
  letter-spacing:.16em;
  color:var(--brass-deep);
  text-transform:uppercase;
}
h1{
  font-family:'Noto Serif TC',serif;
  font-size:24px;
  margin:2px 0 12px;
  font-weight:700;
}

.week-toggle{
  display:flex;
  border:1.5px solid var(--ink);
  border-radius:8px;
  overflow:hidden;
  font-family:'IBM Plex Mono',monospace;
  font-size:13px;
}
.week-toggle button{
  flex:1;
  border:none;
  background:var(--card);
  color:var(--ink);
  padding:10px 6px;
  cursor:pointer;
  font-family:inherit;
  font-size:inherit;
  font-weight:600;
}
.week-toggle button + button{border-left:1.5px solid var(--ink);}
.week-toggle button.active{background:var(--ink);color:var(--paper);}

.scope-toggle{
  display:flex;
  border:1.5px solid var(--ink);
  border-radius:8px;
  overflow:hidden;
  font-family:'IBM Plex Mono',monospace;
  font-size:12.5px;
  margin-top:10px;
}
.scope-toggle button{
  flex:1;
  border:none;
  background:var(--card);
  color:var(--ink);
  padding:8px 6px;
  cursor:pointer;
  font-family:inherit;
  font-size:inherit;
  font-weight:600;
}
.scope-toggle button + button{border-left:1.5px solid var(--ink);}
.scope-toggle button.active{background:var(--brass-deep);color:#fff;}

.week-nav{
  display:flex;
  align-items:center;
  gap:8px;
  margin-top:10px;
}
.week-nav button{
  width:32px;height:32px;
  flex:none;
  border:1.5px solid var(--ink);
  background:var(--card);
  color:var(--ink);
  border-radius:50%;
  font-size:16px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:inherit;
}
.week-nav button:active{background:var(--paper);}
.week-nav .wlabel{
  flex:1;
  text-align:center;
  font-family:'IBM Plex Mono',monospace;
  font-size:13px;
  font-weight:600;
  color:var(--ink);
}
.week-nav .wlabel small{
  display:block;
  font-size:10.5px;
  font-weight:400;
  color:var(--ink-soft);
  margin-top:1px;
}
.week-nav .todayBtn{
  width:auto;
  border-radius:14px;
  padding:0 10px;
  font-size:11px;
  font-family:'IBM Plex Mono',monospace;
  color:var(--brass-deep);
}

.week-label{
  font-family:'IBM Plex Mono',monospace;
  font-size:14px;
  font-weight:600;
  color:var(--brass-deep);
  margin-top:8px;
}

/* ---- 依姓名檢視 ---- */
.person{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:10px;
  margin-top:14px;
  overflow:hidden;
  padding-bottom:12px;
}
.person-title{
  display:flex;
  align-items:baseline;
  flex-wrap:wrap;
  row-gap:2px;
  gap:8px;
  padding:12px 14px 10px;
}
.person-title .nm{
  font-weight:700;
  font-size:15px;
  color:var(--ink);
}
.person-title .hrs{
  margin-left:auto;
  font-size:11px;
  color:var(--ink-soft);
  font-family:'IBM Plex Mono',monospace;
  white-space:nowrap;
}
.week-strip{
  padding:0 12px;
}
.dh-row, .cell-row{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:5px;
}
.dh{
  text-align:center;
  padding-bottom:6px;
}
.dh .wd{
  display:block;
  font-size:10px;
  color:var(--ink-soft);
}
.dh .dn{
  display:block;
  font-size:12.5px;
  font-weight:700;
  color:var(--ink);
  font-family:'IBM Plex Mono',monospace;
  margin-top:1px;
}
.timecell{
  position:relative;
  min-height:58px;
  background:var(--paper);
  border-radius:6px;
  display:flex;
  align-items:center;
  justify-content:center;
}
.timecell.morning{background:#E9F1EC;}
.timecell.midday{background:#F5EBDC;}
.timecell.evening{background:#F3E3DE;}
.celltime{
  text-align:center;
  line-height:1.3;
  font-size:11px;
  font-weight:600;
  color:var(--ink);
  font-family:'IBM Plex Mono',monospace;
}
.celltime b{
  display:block;
  font-size:9px;
  font-weight:700;
  margin-bottom:2px;
  font-family:'Noto Sans TC','Noto Sans',sans-serif;
}
.celltime.morning b{color:var(--teal);}
.celltime.midday b{color:var(--brass-deep);}
.celltime.evening b{color:var(--brick);}
.off-x{
  font-size:11px;
  color:var(--ink-soft);
  opacity:.5;
}

.sync-bar{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:11.5px;
  color:var(--ink-soft);
  margin-top:8px;
}
.sync-dot{
  width:7px;height:7px;border-radius:50%;
  background:#9AA0A6;
  flex:none;
}
.sync-dot.ok{background:var(--teal);}
.sync-dot.err{background:var(--brick);}
.sync-dot.loading{background:var(--brass-deep);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.sync-bar button{
  margin-left:auto;
  border:1px solid var(--line);
  background:var(--card);
  color:var(--brass-deep);
  font-size:11px;
  font-weight:600;
  padding:5px 10px;
  border-radius:14px;
  cursor:pointer;
  font-family:inherit;
}

.error-box{
  margin:10px 0 0;
  padding:12px 14px;
  background:#F7E4DE;
  color:var(--brick);
  border-radius:8px;
  font-size:12.5px;
  line-height:1.5;
}
.error-box a{color:var(--brick);}
.error-box button{
  display:block;
  margin-top:8px;
  border:1px solid var(--brick);
  background:#fff;
  color:var(--brick);
  font-size:12px;
  padding:6px 12px;
  border-radius:12px;
  cursor:pointer;
  font-family:inherit;
}

/* day card */
.day-card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:10px;
  margin-top:14px;
  overflow:hidden;
}
.day-head{
  display:flex;
  align-items:baseline;
  gap:10px;
  padding:12px 14px;
  background:var(--ink);
  color:var(--paper);
}
.day-head .dname{
  font-weight:500;
  font-size:13px;
  opacity:.8;
}
.day-head .ddate{
  font-family:'IBM Plex Mono',monospace;
  font-size:19px;
  font-weight:700;
  letter-spacing:.02em;
  opacity:1;
}
.day-head .dcount{
  margin-left:auto;
  font-family:'IBM Plex Mono',monospace;
  font-size:11.5px;
  opacity:.85;
}

.shift-row{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px 14px;
  border-top:1px solid var(--line);
}
.shift-row .dot{
  width:8px;height:8px;border-radius:50%;
  flex:none;
}
.dot.morning{background:var(--teal);}
.dot.midday{background:var(--brass);}
.dot.evening{background:var(--brick);}

.shift-row .nm{
  font-weight:700;
  font-size:14.5px;
  flex:none;
  width:64px;
}
.shift-row .time{
  font-family:'IBM Plex Mono',monospace;
  font-size:13px;
  color:var(--ink-soft);
  margin-left:auto;
}
.empty-note{
  padding:14px;
  text-align:center;
  color:var(--ink-soft);
  font-size:12.5px;
}

footer{
  margin-top:24px;
  text-align:center;
  font-size:11px;
  color:var(--ink-soft);
  font-family:'IBM Plex Mono',monospace;
}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">Fundamental</div>
    <h1 id="pageTitle">下週班表</h1>
    <div class="week-toggle" id="weekToggle"></div>
    <div class="scope-toggle" id="viewToggle"></div>
    <div class="week-label" id="weekLabel">讀取中…</div>
    <div class="sync-bar">
      <span class="sync-dot" id="syncDot"></span>
      <span id="syncText">連線中…</span>
      <button id="refreshBtn">重新整理</button>
    </div>
  </header>

  <div id="errorBox" class="error-box" style="display:none;"></div>
  <div id="board"></div>
  <footer id="footerNote"></footer>
</div>

<script>
const SPREADSHEET_ID = '15hFGI2QqKJrGic60pGQOcEPUH3UDQnbpl6VnIcJchWA';
const CSV_BASE = 'https://docs.google.com/spreadsheets/d/' + SPREADSHEET_ID + '/gviz/tq?tqx=out:csv';
const AUTO_REFRESH_MS = 60000;

const WD_FULL = ['週一','週二','週三','週四','週五','週六','週日'];
const DAYS = ['一','二','三','四','五','六','日'];

/* ---- 狀態 ---- */
let weekChoice = 'next'; // 'current' | 'next'
let currentView = 'day'; // 'day' | 'person'

/* ---- 日期工具 ---- */
function mondayOf(d){
  const day = d.getDay();
  const diff = (day === 0 ? -6 : 1 - day);
  const m = new Date(d);
  m.setDate(d.getDate() + diff);
  m.setHours(0,0,0,0);
  return m;
}
function addDays(d,n){ const r=new Date(d); r.setDate(r.getDate()+n); return r; }
function fmtMD(d){
  return String(d.getMonth()+1).padStart(2,'0') + '/' + String(d.getDate()).padStart(2,'0');
}
function sheetNameFor(monday){
  return fmtMD(monday).replace('/', '');
}
function sameDay(a,b){ return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate(); }

function targetMonday(){
  return weekChoice === 'current' ? mondayOf(new Date()) : addDays(mondayOf(new Date()), 7);
}

/* ---- CSV 解析 ---- */
function parseCSV(text){
  const rows = [];
  let row = [], cell = '', inQuotes = false;
  for(let i=0;i<text.length;i++){
    const c = text[i];
    if(inQuotes){
      if(c === '"'){
        if(text[i+1] === '"'){ cell += '"'; i++; }
        else inQuotes = false;
      } else cell += c;
    } else {
      if(c === '"') inQuotes = true;
      else if(c === ','){ row.push(cell); cell=''; }
      else if(c === '\n'){ row.push(cell); rows.push(row); row=[]; cell=''; }
      else if(c === '\r'){ /* skip */ }
      else cell += c;
    }
  }
  if(cell.length || row.length){ row.push(cell); rows.push(row); }
  return rows;
}

function extractSchedule(rows){
  const SHIFT_RE = /^\d+(\.\d+)?~\d+(\.\d+)?$/;
  let headerRowIdx = -1, nameCol = -1;
  for(let r=0;r<rows.length;r++){
    for(let c=0;c<rows[r].length;c++){
      if(rows[r][c] === '週一' && rows[r][c+6] === '週日' && rows[r][c-1] === '姓名'){
        headerRowIdx = r; nameCol = c-1; break;
      }
    }
    if(headerRowIdx>=0) break;
  }
  if(headerRowIdx<0) throw new Error('找不到班表欄位');

  const dateRow = rows[headerRowIdx+1] || [];
  const dates = [];
  for(let k=0;k<7;k++) dates.push((dateRow[nameCol+1+k]||'').trim());

  const data = {};
  for(let r=headerRowIdx+2; r<rows.length; r++){
    const name = (rows[r][nameCol]||'').trim();
    if(!name || name==='總計') continue;
    const shifts = [];
    for(let k=0;k<7;k++){
      const v = (rows[r][nameCol+1+k]||'').trim();
      shifts.push(SHIFT_RE.test(v) ? v : null);
    }
    data[name] = shifts;
  }
  return {data, dates};
}

/* ---- 工具函式 ---- */
function parseShift(t){
  const [a,b] = t.split('~').map(Number);
  return {start:a, end:b};
}
function fmtHM(h){
  const hh = Math.floor(h);
  const mm = Math.round((h-hh)*60);
  return String(hh).padStart(2,'0')+':'+String(mm).padStart(2,'0');
}
function shiftClass(start,end){
  if(end >= 20) return 'evening';
  if(start < 12) return 'morning';
  if(start < 17) return 'midday';
  return 'evening';
}
function shiftLabel(start,end){
  if(end >= 20) return '晚班';
  if(start < 12) return '早班';
  if(start < 17) return '午班';
  return '晚班';
}

/* ---- 讀取下週分頁 ---- */
async function fetchWeekSheet(monday){
  const name = sheetNameFor(monday);
  const url = CSV_BASE + '&sheet=' + encodeURIComponent(name) + '&_=' + Date.now();
  const res = await fetch(url);
  const text = await res.text();
  if(!res.ok || /^\s*</.test(text) || /Invalid query|does not exist|invalid_query/i.test(text)){
    return null;
  }
  return extractSchedule(parseCSV(text));
}

/* ---- 組出下週 7 天的上班名單 ---- */
async function buildDayList(startDate, endDate){
  const wk = await fetchWeekSheet(startDate);
  const days = [];
  let cursor = new Date(startDate);
  while(cursor <= endDate){
    let entries = [];
    if(wk){
      const dayOffset = Math.round((cursor - startDate) / 86400000);
      Object.keys(wk.data).forEach(name=>{
        const t = wk.data[name][dayOffset];
        if(t){ const {start,end}=parseShift(t); entries.push({name,start,end}); }
      });
      entries.sort((a,b)=>a.start-b.start);
    }
    days.push({date:new Date(cursor), entries, noSheet: !wk});
    cursor = addDays(cursor,1);
  }
  return days;
}

/* ---- 渲染 ---- */
function renderDayCards(days){
  let html = '';
  const today = new Date(); today.setHours(0,0,0,0);
  days.forEach(d=>{
    const wd = WD_FULL[(d.date.getDay()+6)%7];
    const isToday = sameDay(d.date, today);
    html += `<div class="day-card"${isToday?' style="outline:2px solid var(--brass);"':''}>
      <div class="day-head">
        <span class="dname">${wd}</span>
        <span class="ddate">${fmtMD(d.date)}${isToday?'・今天':''}</span>
        <span class="dcount">${d.entries.length} 人</span>
      </div>
      ${d.noSheet
        ? `<div class="empty-note">此週尚未建立班表</div>`
        : (d.entries.length ? d.entries.map(e=>`
        <div class="shift-row">
          <span class="dot ${shiftClass(e.start,e.end)}"></span>
          <span class="nm">${e.name}</span>
          <span class="time">${fmtHM(e.start)}–${fmtHM(e.end)}</span>
        </div>
      `).join('') : `<div class="empty-note">本日無排班</div>`)}
    </div>`;
  });
  document.getElementById('board').innerHTML = html || '<div class="empty-note">沒有資料</div>';
}

/* ---- 依姓名檢視 ---- */
function renderPersonStrip(days){
  const personMap = {};
  days.forEach((d,i)=>{
    d.entries.forEach(e=>{
      if(!personMap[e.name]) personMap[e.name] = new Array(7).fill(null);
      personMap[e.name][i] = {start:e.start, end:e.end};
    });
  });
  const names = Object.keys(personMap).sort((a,b)=>{
    const hrsOf = arr => arr.reduce((s,x)=> s + (x? x.end-x.start : 0), 0);
    return hrsOf(personMap[b]) - hrsOf(personMap[a]);
  });

  let html = '';
  names.forEach(name=>{
    const shifts = personMap[name];
    const hrs = shifts.reduce((s,x)=> s + (x? x.end-x.start : 0), 0);
    const workDays = shifts.filter(Boolean).length;
    const offDays = shifts.length - workDays;

    html += `<div class="person">
      <div class="person-title">
        <span class="nm">${name}</span>
        <span class="hrs">上班 ${workDays} 天・休假 ${offDays} 天・共 ${hrs.toFixed(1)} 小時</span>
      </div>
      <div class="week-strip">
        <div class="dh-row">
          ${days.map(d=>`<div class="dh"><span class="wd">${DAYS[(d.date.getDay()+6)%7]}</span><span class="dn">${fmtMD(d.date)}</span></div>`).join('')}
        </div>
        <div class="cell-row">
          ${shifts.map(s=>{
            if(!s){ return `<div class="timecell"><span class="off-x">休</span></div>`; }
            const cls = shiftClass(s.start,s.end);
            return `<div class="timecell ${cls}">
              <div class="celltime ${cls}"><b>${shiftLabel(s.start,s.end)}</b>${fmtHM(s.start)}<br>${fmtHM(s.end)}</div>
            </div>`;
          }).join('')}
        </div>
      </div>
    </div>`;
  });

  document.getElementById('board').innerHTML = html || '<div class="empty-note">這週試算表尚無排班資料</div>';
}

function updateLabel(text){
  document.getElementById('weekLabel').textContent = text;
}
function setSync(state,text){
  document.getElementById('syncDot').className = 'sync-dot ' + state;
  document.getElementById('syncText').textContent = text;
}
function showError(msg){
  const box = document.getElementById('errorBox');
  box.innerHTML = msg + `<button id="retryBtn">重試</button>`;
  box.style.display = 'block';
  document.getElementById('retryBtn').onclick = loadAndRender;
}

async function loadAndRender(){
  setSync('loading','讀取中…');
  document.getElementById('errorBox').style.display = 'none';
  try{
    const monday = targetMonday();
    const start = monday, end = addDays(monday,6);
    document.getElementById('pageTitle').textContent = weekChoice==='current' ? '本週班表' : '下週班表';
    updateLabel(`${sheetNameFor(monday)} · ${fmtMD(start)} – ${fmtMD(end)}`);
    const days = await buildDayList(start, end);
    if(currentView === 'person'){ renderPersonStrip(days); } else { renderDayCards(days); }
    setSync('ok', '已同步 · ' + new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'}));
  } catch(err){
    setSync('err','讀取失敗');
    showError('讀取試算表時發生錯誤,請稍後再試。');
    console.error(err);
  }
}

function renderWeekToggle(){
  const el = document.getElementById('weekToggle');
  el.innerHTML = '';
  [['current','當週'],['next','下週']].forEach(([key,label])=>{
    const b = document.createElement('button');
    b.textContent = label;
    if(key===weekChoice) b.classList.add('active');
    b.onclick = ()=>{ weekChoice = key; renderWeekToggle(); loadAndRender(); };
    el.appendChild(b);
  });
}
function renderViewToggle(){
  const el = document.getElementById('viewToggle');
  el.innerHTML = '';
  [['day','依星期'],['person','依姓名']].forEach(([key,label])=>{
    const b = document.createElement('button');
    b.textContent = label;
    if(key===currentView) b.classList.add('active');
    b.onclick = ()=>{ currentView = key; renderViewToggle(); loadAndRender(); };
    el.appendChild(b);
  });
}

document.getElementById('refreshBtn').onclick = loadAndRender;

renderWeekToggle();
renderViewToggle();
loadAndRender();
setInterval(loadAndRender, AUTO_REFRESH_MS);
</script>
</body>
</html>
