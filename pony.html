<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>孟穎的班表</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');

:root{
  --bg:#FFFFFF;
  --surface:#F8F9FA;
  --border:#E3E3E3;
  --text:#3C4043;
  --text2:#70757A;
  --blue:#1A73E8;
  --blue-tint:#E8F0FE;

  --morning:#0B8043;
  --midday:#F4511E;
  --evening:#8E24AA;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  background:var(--surface);
  color:var(--text);
  font-family:'Roboto','Noto Sans TC',sans-serif;
  -webkit-font-smoothing:antialiased;
}
.wrap{max-width:420px;margin:0 auto;padding:0 0 40px;}

header{
  position:sticky;top:0;z-index:10;
  background:var(--bg);
  border-bottom:1px solid var(--border);
  padding:16px 16px 12px;
  text-align:center;
}
.eyebrow{
  font-size:11px;font-weight:700;letter-spacing:.14em;
  color:var(--blue);text-transform:uppercase;margin-bottom:2px;
}
h1{font-size:20px;font-weight:700;margin:0 0 12px;color:var(--text);}

.week-nav{
  display:flex;align-items:center;gap:10px;margin-bottom:6px;
}
.week-nav button{
  width:40px;height:40px;flex:none;
  border:1px solid var(--border);background:var(--bg);color:var(--text);
  border-radius:50%;font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-family:inherit;
}
.week-nav button:active{background:var(--surface);}
.week-nav .wlabel{flex:1;text-align:center;font-size:15px;font-weight:700;color:var(--text);}
.week-nav .wlabel small{display:block;font-size:11.5px;font-weight:400;color:var(--text2);margin-top:2px;}
.todayBtn{
  height:32px;border-radius:14px;padding:0 12px;font-size:12px;
  color:var(--blue);border:1px solid var(--border);background:var(--bg);
  cursor:pointer;font-family:inherit;
}

.sync-bar{
  display:flex;align-items:center;justify-content:center;gap:6px;
  font-size:11.5px;color:var(--text2);
}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#9AA0A6;flex:none;}
.sync-dot.ok{background:var(--morning);}
.sync-dot.err{background:#D93025;}
.sync-dot.loading{background:var(--blue);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}

.list{padding:14px 14px 0;}
.day-row{
  display:flex;align-items:center;gap:14px;
  padding:14px 16px;margin-bottom:8px;
  border-radius:10px;background:var(--surface);
}
.day-row.morning{background:#E6F4EA;}
.day-row.midday{background:#FCE8E6;}
.day-row.evening{background:#F3E8FD;}
.day-row.today{outline:2px solid var(--blue);outline-offset:-2px;}

.dlabel{width:56px;flex:none;}
.dlabel .wd{display:block;font-size:14px;font-weight:700;color:var(--text);}
.dlabel .dn{display:block;font-size:11.5px;color:var(--text2);margin-top:1px;}

.dshift{flex:1;}
.dshift .tag{font-size:11px;font-weight:700;}
.day-row.morning .tag{color:var(--morning);}
.day-row.midday .tag{color:var(--midday);}
.day-row.evening .tag{color:var(--evening);}
.dshift .time{font-size:15px;font-weight:500;color:var(--text);margin-top:2px;}

.off{font-size:13px;color:var(--text2);}

.summary{
  margin:10px 14px 0;padding:12px 16px;
  background:var(--bg);border:1px solid var(--border);border-radius:10px;
  font-size:12.5px;color:var(--text2);text-align:center;
}

.error-box{
  margin:10px 14px 0;padding:12px 14px;background:#FCE8E6;color:#B3261E;
  border-radius:8px;font-size:12.5px;line-height:1.5;
}
.error-box button{
  display:block;margin-top:8px;border:1px solid #B3261E;background:#fff;color:#B3261E;
  font-size:12px;padding:6px 12px;border-radius:12px;cursor:pointer;font-family:inherit;
}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">Fundamental</div>
    <h1>孟穎的班表</h1>
    <div class="week-nav">
      <button id="prevBtn">‹</button>
      <div class="wlabel" id="weekLabel">讀取中…</div>
      <button id="nextBtn">›</button>
    </div>
    <button class="todayBtn" id="todayBtn" style="margin-bottom:8px;">回到本週</button>
    <div class="sync-bar">
      <span class="sync-dot" id="syncDot"></span>
      <span id="syncText">連線中…</span>
    </div>
  </header>

  <div id="errorBox" class="error-box" style="display:none;"></div>
  <div class="list" id="list"></div>
  <div class="summary" id="summary"></div>
</div>

<script>
const SPREADSHEET_ID = '15hFGI2QqKJrGic60pGQOcEPUH3UDQnbpl6VnIcJchWA';
const CSV_BASE = 'https://docs.google.com/spreadsheets/d/' + SPREADSHEET_ID + '/gviz/tq?tqx=out:csv';
const PERSON_NAME = '孟穎';
const AUTO_REFRESH_MS = 60000;

const WEEKDAYS = ['週一','週二','週三','週四','週五','週六','週日'];

function mondayOf(d){
  const day = d.getDay();
  const diff = (day === 0 ? -6 : 1 - day);
  const m = new Date(d);
  m.setDate(d.getDate() + diff);
  m.setHours(0,0,0,0);
  return m;
}
function fmtMD(d){ return String(d.getMonth()+1).padStart(2,'0') + '/' + String(d.getDate()).padStart(2,'0'); }
function sheetNameFor(monday){ return fmtMD(monday).replace('/', ''); }
function fullyEncode(str){
  return encodeURIComponent(str).replace(/[!'()*]/g, c => '%' + c.charCodeAt(0).toString(16).toUpperCase());
}
function addDays(d,n){ const r=new Date(d); r.setDate(r.getDate()+n); return r; }
function sameDay(a,b){ return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate(); }

let currentMonday = mondayOf(new Date());

function parseCSV(text){
  const rows = [];
  let row = [], cell = '', inQuotes = false;
  for(let i=0;i<text.length;i++){
    const c = text[i];
    if(inQuotes){
      if(c === '"'){ if(text[i+1] === '"'){ cell += '"'; i++; } else inQuotes = false; }
      else cell += c;
    } else {
      if(c === '"') inQuotes = true;
      else if(c === ','){ row.push(cell); cell=''; }
      else if(c === '\n'){ row.push(cell); rows.push(row); row=[]; cell=''; }
      else if(c === '\r'){ }
      else cell += c;
    }
  }
  if(cell.length || row.length){ row.push(cell); rows.push(row); }
  return rows;
}

function extractSchedule(rows){
  const SHIFT_RE = /^\d+(\.\d+)?~\d+(\.\d+)?$/;
  let headerRowIdx = -1, nameCol = -1;
  for(let r=0;r<rows.length;r++){
    for(let c=0;c<rows[r].length;c++){
      if(rows[r][c] === '週一' && rows[r][c+6] === '週日' && rows[r][c-1] === '姓名'){
        headerRowIdx = r; nameCol = c-1; break;
      }
    }
    if(headerRowIdx>=0) break;
  }
  if(headerRowIdx<0) throw new Error('找不到班表欄位');

  const data = {};
  for(let r=headerRowIdx+2; r<rows.length; r++){
    const name = (rows[r][nameCol]||'').trim();
    if(!name || name==='總計') continue;
    const shifts = [];
    for(let k=0;k<7;k++){
      const v = (rows[r][nameCol+1+k]||'').trim();
      shifts.push(SHIFT_RE.test(v) ? v : null);
    }
    data[name] = shifts;
  }
  return data;
}

async function fetchWeekSheet(monday){
  const name = sheetNameFor(monday);
  const url = CSV_BASE + '&sheet=' + fullyEncode(name) + '&_=' + Date.now();
  const res = await fetch(url);
  const text = await res.text();
  if(!res.ok || /^\s*</.test(text) || /Invalid query|does not exist|invalid_query/i.test(text)){
    return null;
  }
  return extractSchedule(parseCSV(text));
}

function parseShift(t){
  const [a,b] = t.split('~').map(Number);
  return {start:a, end:b};
}
function fmtHM(h){
  const hh = Math.floor(h);
  const mm = Math.round((h-hh)*60);
  return String(hh).padStart(2,'0')+':'+String(mm).padStart(2,'0');
}
function shiftClass(start,end){
  if(end >= 20) return 'evening';
  if(start < 12) return 'morning';
  if(start < 17) return 'midday';
  return 'evening';
}
function shiftLabel(start,end){
  if(end >= 20) return '晚班';
  if(start < 12) return '早班';
  if(start < 17) return '午班';
  return '晚班';
}

function setSync(state,text){
  document.getElementById('syncDot').className = 'sync-dot ' + state;
  document.getElementById('syncText').textContent = text;
}
function showError(msg){
  const box = document.getElementById('errorBox');
  box.innerHTML = msg + `<button id="retryBtn">重試</button>`;
  box.style.display = 'block';
  document.getElementById('retryBtn').onclick = loadAndRender;
}

async function loadAndRender(){
  setSync('loading','讀取中…');
  document.getElementById('errorBox').style.display = 'none';
  try{
    const sunday = addDays(currentMonday,6);
    document.getElementById('weekLabel').innerHTML =
      `${sheetNameFor(currentMonday)}<small>${fmtMD(currentMonday)} – ${fmtMD(sunday)}</small>`;

    const data = await fetchWeekSheet(currentMonday);
    const today = new Date(); today.setHours(0,0,0,0);

    let html = '';
    let hrs = 0, workDays = 0;

    for(let k=0;k<7;k++){
      const date = addDays(currentMonday,k);
      const isToday = sameDay(date, today);
      const raw = data ? data[PERSON_NAME] && data[PERSON_NAME][k] : null;

      if(raw){
        const {start,end} = parseShift(raw);
        hrs += (end-start);
        workDays++;
        const cls = shiftClass(start,end);
        html += `<div class="day-row ${cls}${isToday?' today':''}">
          <div class="dlabel"><span class="wd">${WEEKDAYS[k]}</span><span class="dn">${fmtMD(date)}${isToday?'・今天':''}</span></div>
          <div class="dshift"><span class="tag">${shiftLabel(start,end)}</span><div class="time">${fmtHM(start)} – ${fmtHM(end)}</div></div>
        </div>`;
      } else {
        html += `<div class="day-row${isToday?' today':''}">
          <div class="dlabel"><span class="wd">${WEEKDAYS[k]}</span><span class="dn">${fmtMD(date)}${isToday?'・今天':''}</span></div>
          <div class="dshift"><span class="off">${data ? '休假' : '尚無班表'}</span></div>
        </div>`;
      }
    }

    document.getElementById('list').innerHTML = html;
    document.getElementById('summary').textContent =
      data ? `本週上班 ${workDays} 天・共 ${hrs.toFixed(1)} 小時` : '此週尚未建立班表';

    setSync('ok', '已同步 · ' + new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'}));
  } catch(err){
    setSync('err','讀取失敗');
    showError('無法讀取 Google 試算表資料。請確認該試算表的共用設定為「知道連結的任何人」皆可檢視。');
    console.error(err);
  }
}

document.getElementById('prevBtn').onclick = ()=>{ currentMonday = addDays(currentMonday,-7); loadAndRender(); };
document.getElementById('nextBtn').onclick = ()=>{ currentMonday = addDays(currentMonday,7); loadAndRender(); };
document.getElementById('todayBtn').onclick = ()=>{ currentMonday = mondayOf(new Date()); loadAndRender(); };

(function(){
  let sx=0, sy=0;
  document.addEventListener('touchstart', e=>{ const t=e.touches[0]; sx=t.clientX; sy=t.clientY; }, {passive:true});
  document.addEventListener('touchend', e=>{
    const t = e.changedTouches[0];
    const dx = t.clientX - sx, dy = t.clientY - sy;
    if(Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.5){
      if(dx < 0) document.getElementById('nextBtn').click();
      else document.getElementById('prevBtn').click();
    }
  }, {passive:true});
})();

loadAndRender();
setInterval(loadAndRender, AUTO_REFRESH_MS);
</script>
</body>
</html>
