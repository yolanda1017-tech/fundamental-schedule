<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>孟穎的班表</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');

:root{
  --bg:#FFFFFF;
  --surface:#F8F9FA;
  --border:#E3E3E3;
  --text:#3C4043;
  --text2:#70757A;
  --blue:#1A73E8;
  --blue-tint:#E8F0FE;

  --morning:#0B8043;
  --midday:#F4511E;
  --evening:#8E24AA;

  --morning-bg:#E6F4EA;
  --midday-bg:#FCE8E6;
  --evening-bg:#F3E8FD;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;width:100%;overflow-x:hidden;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Roboto','Noto Sans TC',sans-serif;
  -webkit-font-smoothing:antialiased;
}
.wrap{width:100%;max-width:420px;margin:0 auto;padding:0 0 12px;}

header{
  position:sticky;top:0;z-index:10;
  background:var(--bg);
  border-bottom:1px solid var(--border);
  padding:12px 12px 10px;
  text-align:center;
}
h1{font-size:17px;font-weight:700;margin:0 0 8px;color:var(--text);}

.month-nav{
  display:flex;align-items:center;gap:6px;margin-bottom:6px;
}
.month-nav button{
  width:34px;height:34px;flex:none;
  border:1px solid var(--border);background:var(--surface);color:var(--text);
  border-radius:50%;font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-family:inherit;
}
.month-nav button:active{background:var(--blue-tint);}
.month-nav .mlabel{flex:1;text-align:center;font-size:15px;font-weight:700;color:var(--text);}
.todayBtn{
  height:28px;border-radius:14px;padding:0 10px;font-size:11px;
  color:var(--blue);border:1px solid var(--border);background:var(--surface);
  cursor:pointer;font-family:inherit;flex:none;
}

.sync-bar{
  display:flex;align-items:center;justify-content:center;gap:6px;
  font-size:10.5px;color:var(--text2);margin-top:2px;
}
.sync-dot{width:6px;height:6px;border-radius:50%;background:#9AA0A6;flex:none;}
.sync-dot.ok{background:var(--morning);}
.sync-dot.err{background:#D93025;}
.sync-dot.loading{background:var(--blue);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}

.legend{
  display:flex;justify-content:center;gap:12px;
  padding:6px 12px 0;font-size:10px;color:var(--text2);
}
.legend i{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:3px;vertical-align:1px;}
.legend i.morning{background:var(--morning);}
.legend i.midday{background:var(--midday);}
.legend i.evening{background:var(--evening);}

.cal{padding:10px 8px 0;}
.cal-head{
  display:grid;grid-template-columns:repeat(7,1fr);
  margin-bottom:4px;
}
.cal-head span{
  text-align:center;font-size:11px;color:var(--text2);font-weight:500;
}
.cal-grid{
  display:grid;grid-template-columns:repeat(7,1fr);gap:3px;
}
.cal-cell{
  aspect-ratio:1/1;
  min-height:0;
  border-radius:7px;
  background:var(--surface);
  padding:3px;
  display:flex;flex-direction:column;
  overflow:hidden;
}
.cal-cell.pad{opacity:.32;}
.cal-cell.morning{background:var(--morning-bg);}
.cal-cell.midday{background:var(--midday-bg);}
.cal-cell.evening{background:var(--evening-bg);}
.cal-cell.today{outline:2px solid var(--blue);outline-offset:-2px;}
.cal-cell .dnum{
  font-size:10.5px;font-weight:700;color:var(--text);line-height:1;
}
.cal-cell .dtime{
  margin-top:auto;
  font-size:8.6px;line-height:1.15;font-weight:700;
  color:var(--text);
  word-break:break-word;
}
.cal-cell.morning .dtime{color:var(--morning);}
.cal-cell.midday .dtime{color:var(--midday);}
.cal-cell.evening .dtime{color:var(--evening);}

.summary{
  margin:12px 12px 0;padding:10px 14px;
  background:var(--surface);border:1px solid var(--border);border-radius:10px;
  font-size:12px;color:var(--text2);text-align:center;
}

.error-box{
  margin:10px 12px 0;padding:12px 14px;background:#FCE8E6;color:#B3261E;
  border-radius:8px;font-size:12px;line-height:1.5;
}
.error-box button{
  display:block;margin-top:8px;border:1px solid #B3261E;background:#fff;color:#B3261E;
  font-size:12px;padding:6px 12px;border-radius:12px;cursor:pointer;font-family:inherit;
}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>孟穎的班表</h1>
    <div class="month-nav">
      <button id="prevBtn">‹</button>
      <div class="mlabel" id="monthLabel">讀取中…</div>
      <button id="nextBtn">›</button>
      <button class="todayBtn" id="todayBtn">本月</button>
    </div>
    <div class="sync-bar">
      <span class="sync-dot" id="syncDot"></span>
      <span id="syncText">連線中…</span>
    </div>
  </header>

  <div class="legend">
    <span><i class="morning"></i>早班</span>
    <span><i class="midday"></i>午班</span>
    <span><i class="evening"></i>晚班</span>
  </div>

  <div id="errorBox" class="error-box" style="display:none;"></div>

  <div class="cal">
    <div class="cal-head" id="calHead"></div>
    <div class="cal-grid" id="calGrid"></div>
  </div>

  <div class="summary" id="summary"></div>
</div>

<script>
const SPREADSHEET_ID = '15hFGI2QqKJrGic60pGQOcEPUH3UDQnbpl6VnIcJchWA';
const CSV_BASE = 'https://docs.google.com/spreadsheets/d/' + SPREADSHEET_ID + '/gviz/tq?tqx=out:csv';
const PERSON_NAME = '孟穎';
const AUTO_REFRESH_MS = 60000;

const DAYS = ['一','二','三','四','五','六','日'];

function mondayOf(d){
  const day = d.getDay();
  const diff = (day === 0 ? -6 : 1 - day);
  const m = new Date(d);
  m.setDate(d.getDate() + diff);
  m.setHours(0,0,0,0);
  return m;
}
function firstOfMonth(d){ const r=new Date(d.getFullYear(), d.getMonth(), 1); r.setHours(0,0,0,0); return r; }
function lastOfMonth(d){ const r=new Date(d.getFullYear(), d.getMonth()+1, 0); r.setHours(0,0,0,0); return r; }
function addDays(d,n){ const r=new Date(d); r.setDate(r.getDate()+n); return r; }
function sameDay(a,b){ return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate(); }
function fmtMD(d){ return String(d.getMonth()+1).padStart(2,'0') + '/' + String(d.getDate()).padStart(2,'0'); }
function sheetNameFor(monday){ return fmtMD(monday).replace('/', ''); }
function fullyEncode(str){
  return encodeURIComponent(str).replace(/[!'()*]/g, c => '%' + c.charCodeAt(0).toString(16).toUpperCase());
}

let currentMonthAnchor = firstOfMonth(new Date());
let weekCache = {};

function parseCSV(text){
  const rows = [];
  let row = [], cell = '', inQuotes = false;
  for(let i=0;i<text.length;i++){
    const c = text[i];
    if(inQuotes){
      if(c === '"'){ if(text[i+1] === '"'){ cell += '"'; i++; } else inQuotes = false; }
      else cell += c;
    } else {
      if(c === '"') inQuotes = true;
      else if(c === ','){ row.push(cell); cell=''; }
      else if(c === '\n'){ row.push(cell); rows.push(row); row=[]; cell=''; }
      else if(c === '\r'){ }
      else cell += c;
    }
  }
  if(cell.length || row.length){ row.push(cell); rows.push(row); }
  return rows;
}

function extractSchedule(rows){
  const SHIFT_RE = /^\d+(\.\d+)?~\d+(\.\d+)?$/;
  let headerRowIdx = -1, nameCol = -1;
  for(let r=0;r<rows.length;r++){
    for(let c=0;c<rows[r].length;c++){
      if(rows[r][c] === '週一' && rows[r][c+6] === '週日' && rows[r][c-1] === '姓名'){
        headerRowIdx = r; nameCol = c-1; break;
      }
    }
    if(headerRowIdx>=0) break;
  }
  if(headerRowIdx<0) throw new Error('找不到班表欄位');

  const data = {};
  for(let r=headerRowIdx+2; r<rows.length; r++){
    const name = (rows[r][nameCol]||'').trim();
    if(!name || name==='總計') continue;
    const shifts = [];
    for(let k=0;k<7;k++){
      const v = (rows[r][nameCol+1+k]||'').trim();
      shifts.push(SHIFT_RE.test(v) ? v : null);
    }
    data[name] = shifts;
  }
  return data;
}

async function fetchWeekSheet(monday){
  const name = sheetNameFor(monday);
  if(Object.prototype.hasOwnProperty.call(weekCache, name)) return weekCache[name];
  const url = CSV_BASE + '&sheet=' + fullyEncode(name) + '&_=' + Date.now();
  try{
    const res = await fetch(url);
    const text = await res.text();
    if(!res.ok || /^\s*</.test(text) || /Invalid query|does not exist|invalid_query/i.test(text)){
      weekCache[name] = null;
      return null;
    }
    const parsed = extractSchedule(parseCSV(text));
    weekCache[name] = parsed;
    return parsed;
  } catch(e){
    weekCache[name] = null;
    return null;
  }
}

function parseShift(t){
  const [a,b] = t.split('~').map(Number);
  return {start:a, end:b};
}
function fmtHM(h){
  const hh = Math.floor(h);
  const mm = Math.round((h-hh)*60);
  return mm===0 ? String(hh) : (String(hh)+':'+String(mm).padStart(2,'0'));
}
function shiftClass(start,end){
  if(end >= 20) return 'evening';
  if(start < 12) return 'morning';
  if(start < 17) return 'midday';
  return 'evening';
}

function setSync(state,text){
  document.getElementById('syncDot').className = 'sync-dot ' + state;
  document.getElementById('syncText').textContent = text;
}
function showError(msg){
  const box = document.getElementById('errorBox');
  box.innerHTML = msg + `<button id="retryBtn">重試</button>`;
  box.style.display = 'block';
  document.getElementById('retryBtn').onclick = loadAndRender;
}

document.getElementById('calHead').innerHTML = DAYS.map(d=>`<span>${d}</span>`).join('');

async function loadAndRender(){
  setSync('loading','讀取中…');
  document.getElementById('errorBox').style.display = 'none';
  try{
    const monthStart = firstOfMonth(currentMonthAnchor);
    const monthEnd = lastOfMonth(currentMonthAnchor);
    const gridStart = mondayOf(monthStart);
    const gridEnd = addDays(mondayOf(monthEnd), 6);

    document.getElementById('monthLabel').textContent =
      `${currentMonthAnchor.getFullYear()} 年 ${currentMonthAnchor.getMonth()+1} 月`;

    const mondays = [];
    let m = new Date(gridStart);
    while(m <= gridEnd){ mondays.push(new Date(m)); m = addDays(m,7); }
    const weekResults = await Promise.all(mondays.map(fetchWeekSheet));

    let html = '';
    let workDays = 0, hrs = 0;
    const today = new Date(); today.setHours(0,0,0,0);
    let cursor = new Date(gridStart);

    while(cursor <= gridEnd){
      const idx = mondays.findIndex(mo => mo <= cursor && cursor <= addDays(mo,6));
      const wk = idx>=0 ? weekResults[idx] : null;
      const isPad = cursor.getMonth() !== currentMonthAnchor.getMonth();
      const isToday = sameDay(cursor, today);

      let cls = '', timeHtml = '';
      if(wk && wk[PERSON_NAME]){
        const dayOffset = Math.round((cursor - mondays[idx]) / 86400000);
        const raw = wk[PERSON_NAME][dayOffset];
        if(raw){
          const {start,end} = parseShift(raw);
          cls = shiftClass(start,end);
          timeHtml = `<div class="dtime">${fmtHM(start)}<br>-${fmtHM(end)}</div>`;
          if(!isPad){ workDays++; hrs += (end-start); }
        }
      }

      html += `<div class="cal-cell${isPad?' pad':''}${cls?' '+cls:''}${isToday?' today':''}">
        <span class="dnum">${cursor.getDate()}</span>
        ${timeHtml}
      </div>`;

      cursor = addDays(cursor,1);
    }

    document.getElementById('calGrid').innerHTML = html;
    document.getElementById('summary').textContent = `本月上班 ${workDays} 天・共 ${hrs.toFixed(1)} 小時`;

    setSync('ok', '已同步 · ' + new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'}));
  } catch(err){
    setSync('err','讀取失敗');
    showError('無法讀取 Google 試算表資料。請確認該試算表的共用設定為「知道連結的任何人」皆可檢視。');
    console.error(err);
  }
}

document.getElementById('prevBtn').onclick = ()=>{ currentMonthAnchor.setMonth(currentMonthAnchor.getMonth()-1); loadAndRender(); };
document.getElementById('nextBtn').onclick = ()=>{ currentMonthAnchor.setMonth(currentMonthAnchor.getMonth()+1); loadAndRender(); };
document.getElementById('todayBtn').onclick = ()=>{ currentMonthAnchor = firstOfMonth(new Date()); loadAndRender(); };

(function(){
  let sx=0, sy=0;
  document.addEventListener('touchstart', e=>{ const t=e.touches[0]; sx=t.clientX; sy=t.clientY; }, {passive:true});
  document.addEventListener('touchend', e=>{
    const t = e.changedTouches[0];
    const dx = t.clientX - sx, dy = t.clientY - sy;
    if(Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.5){
      if(dx < 0) document.getElementById('nextBtn').click();
      else document.getElementById('prevBtn').click();
    }
  }, {passive:true});
})();

loadAndRender();
setInterval(()=>{ weekCache = {}; loadAndRender(); }, AUTO_REFRESH_MS);
</script>
</body>
</html>
