<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fundamental зҸӯиЎЁ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');

:root{
  --bg:#FFFFFF;
  --surface:#F8F9FA;
  --border:#E3E3E3;
  --text:#3C4043;
  --text2:#70757A;
  --blue:#1A73E8;
  --blue-tint:#E8F0FE;

  --morning:#0B8043;   /* Basil  - ж—©зҸӯ */
  --midday:#F4511E;    /* Tangerine - еҚҲзҸӯ */
  --evening:#8E24AA;   /* Grape  - жҷҡзҸӯ */
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  background:var(--surface);
  color:var(--text);
  font-family:'Roboto','Noto Sans TC',sans-serif;
  -webkit-font-smoothing:antialiased;
}

.wrap{
  max-width:480px;
  margin:0 auto;
  padding:0 0 40px;
}

/* ---- top bar ---- */
header{
  position:sticky;
  top:0;
  z-index:10;
  background:var(--bg);
  border-bottom:1px solid var(--border);
  padding:14px 16px 10px;
}
.eyebrow{
  font-size:11px;
  font-weight:700;
  letter-spacing:.14em;
  color:var(--blue);
  text-transform:uppercase;
  margin-bottom:2px;
}
h1{
  font-size:18px;
  font-weight:500;
  margin:0 0 12px;
  color:var(--text);
}
.week-toggle{
  display:flex;
  background:var(--surface);
  border-radius:20px;
  padding:3px;
  font-size:13px;
}
.week-toggle button{
  flex:1;
  border:none;
  background:transparent;
  color:var(--text2);
  padding:8px 6px;
  border-radius:16px;
  cursor:pointer;
  font-family:inherit;
  font-size:inherit;
  font-weight:500;
  transition:background .15s,color .15s;
}
.week-toggle button.active{background:var(--blue);color:#fff;}

.legend{
  display:flex;
  gap:16px;
  margin-top:12px;
  font-size:12px;
  color:var(--text2);
}
.legend i{
  display:inline-block;
  width:9px;height:9px;border-radius:2px;
  margin-right:5px;
  vertical-align:1px;
}
.legend i.morning{background:var(--morning);}
.legend i.midday{background:var(--midday);}
.legend i.evening{background:var(--evening);}

.view-toggle{
  display:flex;
  background:var(--surface);
  border-radius:20px;
  padding:3px;
  font-size:12.5px;
  margin-top:6px;
}
.view-toggle button{
  flex:1;
  border:none;
  background:transparent;
  color:var(--text2);
  padding:7px 6px;
  border-radius:16px;
  cursor:pointer;
  font-family:inherit;
  font-size:inherit;
  font-weight:500;
  transition:background .15s,color .15s;
}
.view-toggle button.active{background:var(--text);color:#fff;}

/* ---- day view ---- */
.day-card{
  background:var(--bg);
  margin-top:10px;
  padding:14px 16px 16px;
}
.day-card .dtitle{
  display:flex;
  align-items:baseline;
  gap:8px;
  margin-bottom:10px;
}
.day-card .dtitle .dname{
  font-size:16px;
  font-weight:700;
  color:var(--text);
}
.day-card .dtitle .ddate{
  font-size:13px;
  color:var(--text2);
}
.day-card .dtitle .dcount{
  margin-left:auto;
  font-size:12.5px;
  color:var(--text2);
}
.staff-list{
  display:flex;
  flex-direction:column;
  gap:8px;
}
.staff-row{
  display:flex;
  align-items:center;
  gap:12px;
  padding:11px 14px;
  border-radius:8px;
}
.staff-row.morning{background:#E6F4EA;}
.staff-row.midday{background:#FCE8E6;}
.staff-row.evening{background:#F3E8FD;}
.staff-row .snm{
  font-size:14.5px;
  font-weight:700;
  color:var(--text);
  width:56px;
  flex:none;
}
.staff-row .stime{
  font-size:13.5px;
  font-weight:500;
  color:var(--text);
  margin-left:auto;
}
.staff-row .slabel{
  font-size:11px;
  font-weight:700;
}
.staff-row.morning .slabel{color:var(--morning);}
.staff-row.midday .slabel{color:var(--midday);}
.staff-row.evening .slabel{color:var(--evening);}
.day-empty{
  font-size:13px;
  color:var(--text2);
  padding:8px 2px;
}
.person{
  background:var(--bg);
  margin-top:10px;
  padding-bottom:6px;
}
.person-title{
  display:flex;
  align-items:baseline;
  gap:8px;
  padding:14px 16px 10px;
}
.person-title .nm{
  font-size:16px;
  font-weight:700;
  color:var(--text);
}
.person-title .hrs{
  margin-left:auto;
  font-size:12.5px;
  color:var(--text2);
}

.week-strip{
  padding:0 12px 14px;
}
.dh-row, .cell-row{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:5px;
}
.dh{
  text-align:center;
  padding-bottom:7px;
}
.dh .wd{
  display:block;
  font-size:11px;
  color:var(--text2);
  text-transform:uppercase;
}
.dh .dn{
  display:block;
  font-size:14px;
  font-weight:500;
  color:var(--text);
  margin-top:2px;
}

.timecell{
  position:relative;
  min-height:64px;
  background:var(--surface);
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
}
.timecell.morning{background:#E6F4EA;}
.timecell.midday{background:#FCE8E6;}
.timecell.evening{background:#F3E8FD;}

.celltime{
  text-align:center;
  line-height:1.35;
  font-size:12.5px;
  font-weight:500;
  color:var(--text);
}
.celltime b{
  display:block;
  font-size:10px;
  font-weight:700;
  letter-spacing:.02em;
  margin-bottom:2px;
}
.celltime.morning b{color:var(--morning);}
.celltime.midday b{color:var(--midday);}
.celltime.evening b{color:var(--evening);}

.off-x{
  font-size:13px;
  color:var(--text2);
  opacity:.45;
}

.sync-bar{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:12px;
  color:var(--text2);
  margin-top:6px;
  margin-bottom:6px;
}
.sync-dot{
  width:7px;height:7px;border-radius:50%;
  background:#9AA0A6;
  flex:none;
}
.sync-dot.ok{background:var(--morning);}
.sync-dot.err{background:#D93025;}
.sync-dot.loading{background:var(--blue);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.sync-bar button{
  margin-left:auto;
  border:1px solid var(--border);
  background:var(--bg);
  color:var(--blue);
  font-size:11.5px;
  font-weight:500;
  padding:5px 10px;
  border-radius:14px;
  cursor:pointer;
  font-family:inherit;
}
.sync-bar button:active{background:var(--blue-tint);}

.error-box{
  margin:10px 16px 0;
  padding:12px 14px;
  background:#FCE8E6;
  color:#B3261E;
  border-radius:8px;
  font-size:12.5px;
  line-height:1.5;
}
.error-box button{
  display:block;
  margin-top:8px;
  border:1px solid #B3261E;
  background:#fff;
  color:#B3261E;
  font-size:12px;
  padding:6px 12px;
  border-radius:12px;
  cursor:pointer;
  font-family:inherit;
}

.week-nav{
  display:flex;
  align-items:center;
  gap:8px;
  margin-top:2px;
  margin-bottom:8px;
}
.week-nav button{
  width:32px;height:32px;
  flex:none;
  border:1px solid var(--border);
  background:var(--bg);
  color:var(--text);
  border-radius:50%;
  font-size:16px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:inherit;
}
.week-nav button:active{background:var(--surface);}
.week-nav .wlabel{
  flex:1;
  text-align:center;
  font-size:14px;
  font-weight:500;
  color:var(--text);
}
.week-nav .wlabel small{
  display:block;
  font-size:11px;
  font-weight:400;
  color:var(--text2);
  margin-top:1px;
}
.week-nav .todayBtn{
  width:auto;
  border-radius:14px;
  padding:0 10px;
  font-size:11.5px;
  color:var(--blue);
  border-color:var(--border);
}

footer{
  margin:18px 16px 0;
  font-size:11px;
  color:var(--text2);
}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">Fundamental</div>
    <h1>еӨ–е ҙзҸӯиЎЁ</h1>
    <div class="week-nav">
      <button id="prevWeek" title="дёҠдёҖйҖұ">вҖ№</button>
      <div class="wlabel" id="weekLabel">и®ҖеҸ–дёӯвҖҰ</div>
      <button id="nextWeek" title="дёӢдёҖйҖұ">вҖә</button>
      <button id="todayBtn" class="todayBtn">жң¬йҖұ</button>
    </div>
    <div class="sync-bar">
      <span class="sync-dot" id="syncDot"></span>
      <span id="syncText">йҖЈз·ҡдёӯвҖҰ</span>
      <button id="refreshBtn" title="йҮҚж–°ж•ҙзҗҶ">йҮҚж–°ж•ҙзҗҶ</button>
    </div>
    <div class="view-toggle" id="viewToggle"></div>
    <div class="legend">
      <span><i class="morning"></i>ж—©зҸӯ</span>
      <span><i class="midday"></i>еҚҲзҸӯ</span>
      <span><i class="evening"></i>жҷҡзҸӯ</span>
    </div>
  </header>

  <div id="errorBox" class="error-box" style="display:none;">
    з„Ўжі•и®ҖеҸ– Google и©Ұз®—иЎЁиіҮж–ҷгҖӮи«ӢзўәиӘҚи©Іи©Ұз®—иЎЁзҡ„е…ұз”ЁиЁӯе®ҡзӮәгҖҢзҹҘйҒ“йҖЈзөҗзҡ„д»»дҪ•дәәгҖҚзҡҶеҸҜжӘўиҰ–(иҮіе°‘гҖҢжӘўиҰ–иҖ…гҖҚж¬Ҡйҷҗ),еҗҰеүҮзҖҸиҰҪеҷЁз„Ўжі•и·Ёз¶Іеҹҹи®ҖеҸ–гҖӮ
    <button id="retryBtn">йҮҚи©Ұ</button>
  </div>
  <div id="board"></div>
  <footer id="footerNote"></footer>
</div>

<script>
const SPREADSHEET_ID = '15hFGI2QqKJrGic60pGQOcEPUH3UDQnbpl6VnIcJchWA';
const CSV_BASE = 'https://docs.google.com/spreadsheets/d/' + SPREADSHEET_ID + '/gviz/tq?tqx=out:csv';
const AUTO_REFRESH_MS = 60000; // жҜҸ 60 з§’иҮӘеӢ•йҮҚж–°и®ҖеҸ–дёҖж¬Ў

const WEEKDAYS = ['йҖұдёҖ','йҖұдәҢ','йҖұдёү','йҖұеӣӣ','йҖұдә”','йҖұе…ӯ','йҖұж—Ҙ'];
const DAYS = ['дёҖ','дәҢ','дёү','еӣӣ','дә”','е…ӯ','ж—Ҙ'];

let DATA = {};      // { е§“еҗҚ: [ '11~18', null, ... 7 еҖӢ ] }
let DATES = [];     // 7 еҖӢж—Ҙжңҹеӯ—дёІпјҢдҫӢеҰӮ '7/20'
let currentView = 'person'; // 'person' | 'day'

/* ---------------- йҖұеҲҘпјҲеҲҶй ҒеҗҚзЁұпјҡзҸӯиЎЁ(MM/DD)пјҢMM/DD зӮәи©ІйҖұйҖұдёҖпјү---------------- */
function mondayOf(d){
  const day = d.getDay(); // 0=йҖұж—Ҙ ... 6=йҖұе…ӯ
  const diff = (day === 0 ? -6 : 1 - day);
  const m = new Date(d);
  m.setDate(d.getDate() + diff);
  m.setHours(0,0,0,0);
  return m;
}
function fmtMD(d){
  return String(d.getMonth()+1).padStart(2,'0') + '/' + String(d.getDate()).padStart(2,'0');
}
function sheetNameFor(monday){
  return fmtMD(monday).replace('/', '');
}
function fullyEncode(str){
  // encodeURIComponent й җиЁӯдёҚжңғи·іи„« ( ) ! ' *пјҢйҖҷиЈЎеј·еҲ¶е…ЁйғЁи·іи„«пјҢ
  // йҒҝе…Қ Google gviz з«Ҝй»һе°ҚжӢ¬иҷҹ/ж–ңз·ҡзҡ„и§ЈжһҗеҮәзҸҫиҗҪе·®пјҲзҙ”ж•ёеӯ—еҲҶй ҒеҗҚзЁұйҖҡеёёз”ЁдёҚеҲ°пјҢдҪҶдҝқз•ҷд»ҘйҳІиҗ¬дёҖпјү
  return encodeURIComponent(str).replace(/[!'()*]/g, c => '%' + c.charCodeAt(0).toString(16).toUpperCase());
}
function sundayOf(monday){
  const s = new Date(monday);
  s.setDate(monday.getDate()+6);
  return s;
}

let currentMonday = mondayOf(new Date());

/* ---------------- CSV и§Јжһҗ ---------------- */
function parseCSV(text){
  const rows = [];
  let row = [], cell = '', inQuotes = false;
  for(let i=0;i<text.length;i++){
    const c = text[i];
    if(inQuotes){
      if(c === '"'){
        if(text[i+1] === '"'){ cell += '"'; i++; }
        else inQuotes = false;
      } else cell += c;
    } else {
      if(c === '"') inQuotes = true;
      else if(c === ','){ row.push(cell); cell=''; }
      else if(c === '\n'){ row.push(cell); rows.push(row); row=[]; cell=''; }
      else if(c === '\r'){ /* skip */ }
      else cell += c;
    }
  }
  if(cell.length || row.length){ row.push(cell); rows.push(row); }
  return rows;
}

function extractSchedule(rows){
  const SHIFT_RE = /^\d+(\.\d+)?~\d+(\.\d+)?$/;

  // жүҫеҮәеҗ«гҖҢйҖұдёҖгҖҚзҡ„иЎЁй ӯеҲ—пјҢдёҰе®ҡдҪҚгҖҢе§“еҗҚгҖҚж¬„дҪҚз·ҠжҺҘи‘—гҖҢйҖұдёҖ..йҖұж—ҘгҖҚ7 ж¬„зҡ„еҚҖеЎҠ
  let headerRowIdx = -1, nameCol = -1;
  for(let r=0;r<rows.length;r++){
    for(let c=0;c<rows[r].length;c++){
      if(rows[r][c] === 'йҖұдёҖ' && rows[r][c+6] === 'йҖұж—Ҙ' && rows[r][c-1] === 'е§“еҗҚ'){
        headerRowIdx = r; nameCol = c-1; break;
      }
    }
    if(headerRowIdx>=0) break;
  }
  if(headerRowIdx<0) throw new Error('жүҫдёҚеҲ°зҸӯиЎЁж¬„дҪҚ');

  const dateRow = rows[headerRowIdx+1] || [];
  const dates = [];
  for(let k=0;k<7;k++) dates.push((dateRow[nameCol+1+k]||'').trim());

  const data = {};
  for(let r=headerRowIdx+2; r<rows.length; r++){
    const name = (rows[r][nameCol]||'').trim();
    if(!name || name==='зёҪиЁҲ') continue;
    const shifts = [];
    for(let k=0;k<7;k++){
      const v = (rows[r][nameCol+1+k]||'').trim();
      shifts.push(SHIFT_RE.test(v) ? v : null);
    }
    data[name] = shifts;
  }
  return {data, dates};
}

/* ---------------- е·Ҙе…·еҮҪејҸ ---------------- */
function parseShift(t){
  const [a,b] = t.split('~').map(Number);
  return {start:a, end:b};
}
function fmtHM(h){
  const hh = Math.floor(h);
  const mm = Math.round((h-hh)*60);
  return String(hh).padStart(2,'0')+':'+String(mm).padStart(2,'0');
}
function shiftClass(start,end){
  if(end >= 20) return 'evening';
  if(start < 12) return 'morning';
  if(start < 17) return 'midday';
  return 'evening';
}
function shiftLabel(start,end){
  if(end >= 20) return 'жҷҡзҸӯ';
  if(start < 12) return 'ж—©зҸӯ';
  if(start < 17) return 'еҚҲзҸӯ';
  return 'жҷҡзҸӯ';
}
function totalHours(name){
  return DATA[name].reduce((sum,t)=> t ? sum + (parseShift(t).end - parseShift(t).start) : sum, 0);
}

/* ---------------- и®ҖеҸ– Google и©Ұз®—иЎЁ ---------------- */
function updateWeekLabel(){
  const monday = currentMonday, sunday = sundayOf(currentMonday);
  document.getElementById('weekLabel').innerHTML =
    `${sheetNameFor(monday)}<small>${fmtMD(monday)} вҖ“ ${fmtMD(sunday)}</small>`;
}

async function loadData(){
  updateWeekLabel();
  setSync('loading','и®ҖеҸ–дёӯвҖҰ');
  document.getElementById('errorBox').style.display = 'none';
  const sheetName = sheetNameFor(currentMonday);
  const url = CSV_BASE + '&sheet=' + fullyEncode(sheetName) + '&_=' + Date.now();
  try{
    const res = await fetch(url);
    const text = await res.text();
    if(!res.ok || /^\s*</.test(text) || /Invalid query|does not exist|invalid_query/i.test(text)){
      throw new Error('sheet-not-found: HTTP ' + res.status);
    }
    const {data, dates} = extractSchedule(parseCSV(text));
    DATA = data; DATES = dates;
    const now = new Date();
    setSync('ok', 'е·ІеҗҢжӯҘ В· ' + now.toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'}));
    renderAll();
  } catch(err){
    setSync('err','и®ҖеҸ–еӨұж•—');
    const box = document.getElementById('errorBox');
    box.innerHTML = `жүҫдёҚеҲ°гҖҢ${sheetName}гҖҚйҖҷеҖӢеҲҶй Ғ,жҲ–з„Ўжі•и®ҖеҸ–гҖӮ<br><br>
      дҪ еҸҜд»Ҙй»һдёӢйқўйҖҷеҖӢйҖЈзөҗ,зӣҙжҺҘеңЁзҖҸиҰҪеҷЁжү“й–ӢзңӢ Google еӣһеӮізҡ„еҜҰйҡӣе…§е®№,еҚ”еҠ©еҲӨж–·е•ҸйЎҢ:<br>
      <a href="${url}" target="_blank" style="word-break:break-all;color:#1A73E8;">${url}</a>
      <button id="retryBtn">йҮҚи©Ұ</button>`;
    box.style.display = 'block';
    document.getElementById('retryBtn').onclick = loadData;
    console.error(err);
  }
}
function setSync(state,text){
  document.getElementById('syncDot').className = 'sync-dot ' + state;
  document.getElementById('syncText').textContent = text;
}

/* ---------------- жёІжҹ“ ---------------- */
function renderToggle(){
  const vel = document.getElementById('viewToggle');
  vel.innerHTML = '';
  [['person','дҫқе§“еҗҚ В· дёҖйҖұ'],['day','дҫқж—Ҙжңҹ В· з•¶еӨ©дәәеҠӣ']].forEach(([key,label])=>{
    const b = document.createElement('button');
    b.textContent = label;
    if(key===currentView) b.classList.add('active');
    b.onclick = ()=>{ currentView = key; renderAll(); };
    vel.appendChild(b);
  });
}

function renderBoardByPerson(){
  const names = Object.keys(DATA).sort((a,b)=>totalHours(b)-totalHours(a));

  let html = '';
  names.forEach(name=>{
    const shifts = DATA[name];
    const hrs = totalHours(name);

    html += `<div class="person">
      <div class="person-title">
        <span class="nm">${name}</span>
        <span class="hrs">е…ұ ${hrs.toFixed(1)} е°ҸжҷӮ</span>
      </div>
      <div class="week-strip">
        <div class="dh-row">
          ${DAYS.map((d,i)=>`<div class="dh"><span class="wd">${d}</span><span class="dn">${DATES[i]||''}</span></div>`).join('')}
        </div>
        <div class="cell-row">
          ${shifts.map(t=>{
            if(!t){
              return `<div class="timecell"><span class="off-x">дј‘</span></div>`;
            }
            const {start,end} = parseShift(t);
            const cls = shiftClass(start,end);
            return `<div class="timecell ${cls}">
              <div class="celltime ${cls}"><b>${shiftLabel(start,end)}</b>${fmtHM(start)}<br>${fmtHM(end)}</div>
            </div>`;
          }).join('')}
        </div>
      </div>
    </div>`;
  });

  document.getElementById('board').innerHTML = html || '<div class="day-empty" style="padding:20px 16px;">жң¬йҖұи©Ұз®—иЎЁе°ҡз„ЎжҺ’зҸӯиіҮж–ҷ</div>';
}

function renderBoardByDay(){
  const names = Object.keys(DATA);

  let html = '';
  DAYS.forEach((d,i)=>{
    const entries = names
      .map(n=>({n, t:DATA[n][i]}))
      .filter(x=>x.t)
      .map(x=>({...x, ...parseShift(x.t)}))
      .sort((a,b)=>a.start-b.start);

    html += `<div class="day-card">
      <div class="dtitle">
        <span class="dname">йҖұ${d}</span>
        <span class="ddate">${DATES[i]||''}</span>
        <span class="dcount">${entries.length} дәә</span>
      </div>
      <div class="staff-list">
        ${entries.length ? entries.map(e=>{
          const cls = shiftClass(e.start, e.end);
          return `<div class="staff-row ${cls}">
            <span class="snm">${e.n}</span>
            <span class="slabel">${shiftLabel(e.start, e.end)}</span>
            <span class="stime">${fmtHM(e.start)} вҖ“ ${fmtHM(e.end)}</span>
          </div>`;
        }).join('') : `<div class="day-empty">жң¬ж—Ҙз„ЎжҺ’зҸӯ</div>`}
      </div>
    </div>`;
  });

  document.getElementById('board').innerHTML = html;
}

function renderFooter(){
  document.getElementById('footerNote').textContent =
    DATES.length ? `${DATES[0]}пјҲйҖұдёҖпјүвҖ“ ${DATES[6]}пјҲйҖұж—Ҙпјү` : '';
}

function renderAll(){
  renderToggle();
  if(currentView==='day'){ renderBoardByDay(); } else { renderBoardByPerson(); }
  renderFooter();
}

document.getElementById('refreshBtn').onclick = loadData;
document.getElementById('prevWeek').onclick = ()=>{
  currentMonday.setDate(currentMonday.getDate()-7);
  loadData();
};
document.getElementById('nextWeek').onclick = ()=>{
  currentMonday.setDate(currentMonday.getDate()+7);
  loadData();
};
document.getElementById('todayBtn').onclick = ()=>{
  currentMonday = mondayOf(new Date());
  loadData();
};

loadData();
setInterval(loadData, AUTO_REFRESH_MS);
</script>
</body>
</html>
