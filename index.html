<!DOCTYPE html>

<title>Fundamental зҸӯиЎЁ</title>
<style>

html,body{margin:0;padding:0;}
body{

}
.week-toggle button{

  background:transparent;

  font-size:inherit;

}
.week-toggle button.active{background:var(--blue);color:#fff;}

.legend{

}

}
.legend i.morning{background:var(--morning);}

.view-toggle{

/* ---- month calendar grid (Google Calendar йўЁж јпјҡж је…§зӣҙжҺҘйЎҜзӨәзҸӯиЎЁ) ---- */
.month-wrap{
  background:var(--bg);

}
.month-head-row{
  display:grid;
  grid-template-columns:repeat(7,1fr);

}

}
.month-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);

}
.month-cell{

  border-radius:6px;

.month-cell.pad{opacity:.32;}

  color:var(--text2);

}

.month-entries{

}

.scope-toggle{

<div class="wrap">
  <header>
    <div class="eyebrow">Fundamental</div>

    <div class="scope-toggle" id="scopeToggle"></div>
    <div class="week-nav" id="weekNav">
      <button id="prevBtn" title="дёҠдёҖеҖӢ">вҖ№</button>

      <button id="nextBtn" title="дёӢдёҖеҖӢ">вҖә</button>
      <button id="todayBtn" class="todayBtn">еӣһеҲ°зҸҫеңЁ</button>
    </div>

      <span class="sync-dot" id="syncDot"></span>
      <span id="syncText">йҖЈз·ҡдёӯвҖҰ</span>

    </div>

    <div class="legend">
      <span><i class="morning"></i>ж—©зҸӯ</span>

    </div>
  </header>

  <div id="errorBox" class="error-box" style="display:none;">
    з„Ўжі•и®ҖеҸ– Google и©Ұз®—иЎЁиіҮж–ҷгҖӮи«ӢзўәиӘҚи©Іи©Ұз®—иЎЁзҡ„е…ұз”ЁиЁӯе®ҡзӮәгҖҢзҹҘйҒ“йҖЈзөҗзҡ„д»»дҪ•дәәгҖҚзҡҶеҸҜжӘўиҰ–(иҮіе°‘гҖҢжӘўиҰ–иҖ…гҖҚж¬Ҡйҷҗ),еҗҰеүҮзҖҸиҰҪеҷЁз„Ўжі•и·Ёз¶Іеҹҹи®ҖеҸ–гҖӮ
    <button id="retryBtn">йҮҚи©Ұ</button>
  </div>
  <div id="board"></div>
  <footer id="footerNote"></footer>
</div>

<script>
const SPREADSHEET_ID = '15hFGI2QqKJrGic60pGQOcEPUH3UDQnbpl6VnIcJchWA';
const CSV_BASE = 'https://docs.google.com/spreadsheets/d/' + SPREADSHEET_ID + '/gviz/tq?tqx=out:csv';
const AUTO_REFRESH_MS = 60000; // жҜҸ 60 з§’иҮӘеӢ•йҮҚж–°и®ҖеҸ–дёҖж¬Ў

const WEEKDAYS = ['йҖұдёҖ','йҖұдәҢ','йҖұдёү','йҖұеӣӣ','йҖұдә”','йҖұе…ӯ','йҖұж—Ҙ'];
const DAYS = ['дёҖ','дәҢ','дёү','еӣӣ','дә”','е…ӯ','ж—Ҙ'];

let currentView = 'person'; // 'person' | 'day'
let scope = 'week';         // 'week' | 'month' | 'day'
let weekCache = {};         // sheetName -> {data,dates} | null

/* ---------------- йҖұеҲҘпјҲеҲҶй ҒеҗҚзЁұпјҡзҸӯиЎЁ(MM/DD)пјҢMM/DD зӮәи©ІйҖұйҖұдёҖпјү---------------- */
function mondayOf(d){
  const day = d.getDay(); // 0=йҖұж—Ҙ ... 6=йҖұе…ӯ
  const diff = (day === 0 ? -6 : 1 - day);
  const m = new Date(d);
  m.setDate(d.getDate() + diff);
  m.setHours(0,0,0,0);
  return m;
}
function fmtMD(d){
  return String(d.getMonth()+1).padStart(2,'0') + '/' + String(d.getDate()).padStart(2,'0');
}
function sheetNameFor(monday){
  return fmtMD(monday).replace('/', '');
}
function fullyEncode(str){
  // encodeURIComponent й җиЁӯдёҚжңғи·іи„« ( ) ! ' *пјҢйҖҷиЈЎеј·еҲ¶е…ЁйғЁи·іи„«пјҢ
  // йҒҝе…Қ Google gviz з«Ҝй»һе°ҚжӢ¬иҷҹ/ж–ңз·ҡзҡ„и§ЈжһҗеҮәзҸҫиҗҪе·®пјҲзҙ”ж•ёеӯ—еҲҶй ҒеҗҚзЁұйҖҡеёёз”ЁдёҚеҲ°пјҢдҪҶдҝқз•ҷд»ҘйҳІиҗ¬дёҖпјү
  return encodeURIComponent(str).replace(/[!'()*]/g, c => '%' + c.charCodeAt(0).toString(16).toUpperCase());
}
function sundayOf(monday){
  const s = new Date(monday);
  s.setDate(monday.getDate()+6);
  return s;
}
function addDays(d,n){ const r=new Date(d); r.setDate(r.getDate()+n); return r; }
function firstOfMonth(d){ const r=new Date(d.getFullYear(), d.getMonth(), 1); r.setHours(0,0,0,0); return r; }
function lastOfMonth(d){ const r=new Date(d.getFullYear(), d.getMonth()+1, 0); r.setHours(0,0,0,0); return r; }
function sameDay(a,b){ return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate(); }

let currentMonday = mondayOf(new Date());
let currentMonthAnchor = firstOfMonth(new Date());
let currentDay = (function(){ const d=new Date(); d.setHours(0,0,0,0); return d; })();

/* ---------------- CSV и§Јжһҗ ---------------- */
function parseCSV(text){
  const rows = [];
  let row = [], cell = '', inQuotes = false;
  for(let i=0;i<text.length;i++){
    const c = text[i];
    if(inQuotes){
      if(c === '"'){
        if(text[i+1] === '"'){ cell += '"'; i++; }
        else inQuotes = false;
      } else cell += c;
    } else {
      if(c === '"') inQuotes = true;
      else if(c === ','){ row.push(cell); cell=''; }
      else if(c === '\n'){ row.push(cell); rows.push(row); row=[]; cell=''; }
      else if(c === '\r'){ /* skip */ }
      else cell += c;
    }
  }
  if(cell.length || row.length){ row.push(cell); rows.push(row); }
  return rows;
}

function extractSchedule(rows){
  const SHIFT_RE = /^\d+(\.\d+)?~\d+(\.\d+)?$/;

  // жүҫеҮәеҗ«гҖҢйҖұдёҖгҖҚзҡ„иЎЁй ӯеҲ—пјҢдёҰе®ҡдҪҚгҖҢе§“еҗҚгҖҚж¬„дҪҚз·ҠжҺҘи‘—гҖҢйҖұдёҖ..йҖұж—ҘгҖҚ7 ж¬„зҡ„еҚҖеЎҠ
  let headerRowIdx = -1, nameCol = -1;
  for(let r=0;r<rows.length;r++){
    for(let c=0;c<rows[r].length;c++){
      if(rows[r][c] === 'йҖұдёҖ' && rows[r][c+6] === 'йҖұж—Ҙ' && rows[r][c-1] === 'е§“еҗҚ'){
        headerRowIdx = r; nameCol = c-1; break;
      }
    }
    if(headerRowIdx>=0) break;
  }
  if(headerRowIdx<0) throw new Error('жүҫдёҚеҲ°зҸӯиЎЁж¬„дҪҚ');

  const dateRow = rows[headerRowIdx+1] || [];
  const dates = [];
  for(let k=0;k<7;k++) dates.push((dateRow[nameCol+1+k]||'').trim());

  const data = {};
  for(let r=headerRowIdx+2; r<rows.length; r++){
    const name = (rows[r][nameCol]||'').trim();
    if(!name || name==='зёҪиЁҲ') continue;
    const shifts = [];
    for(let k=0;k<7;k++){
      const v = (rows[r][nameCol+1+k]||'').trim();
      shifts.push(SHIFT_RE.test(v) ? v : null);
    }
    data[name] = shifts;
  }
  return {data, dates};
}

/* ---------------- еӨҡйҖұи®ҖеҸ–пјҲдҫӣз•¶жңҲ/з•¶еӨ©зҜ„еңҚдҪҝз”ЁпјҢеҗ«еҝ«еҸ–пјү---------------- */
async function fetchWeekSheet(monday){
  const name = sheetNameFor(monday);
  if(Object.prototype.hasOwnProperty.call(weekCache, name)) return weekCache[name];
  const url = CSV_BASE + '&sheet=' + fullyEncode(name) + '&_=' + Date.now();
  try{
    const res = await fetch(url);
    const text = await res.text();
    if(!res.ok || /^\s*</.test(text) || /Invalid query|does not exist|invalid_query/i.test(text)){
      weekCache[name] = null;
      return null;
    }
    const parsed = extractSchedule(parseCSV(text));
    weekCache[name] = parsed;
    return parsed;
  } catch(e){
    weekCache[name] = null;
    return null;
  }
}

async function buildDayList(startDate, endDate){
  const mondays = [];
  let m = mondayOf(startDate);
  while(m <= endDate){ mondays.push(new Date(m)); m = addDays(m,7); }
  const weekResults = await Promise.all(mondays.map(fetchWeekSheet));

  const days = [];
  let cursor = new Date(startDate);
  while(cursor <= endDate){
    const idx = mondays.findIndex(mo => mo <= cursor && cursor <= addDays(mo,6));
    const wk = idx>=0 ? weekResults[idx] : null;
    let entries = [];
    if(wk){
      const dayOffset = Math.round((cursor - mondays[idx]) / 86400000);
      Object.keys(wk.data).forEach(name=>{
        const t = wk.data[name][dayOffset];
        if(t){ const {start,end}=parseShift(t); entries.push({name,start,end}); }
      });
      entries.sort((a,b)=>a.start-b.start);
    }
    days.push({date:new Date(cursor), entries, noSheet: !wk});
    cursor = addDays(cursor,1);
  }
  return days;
}

/* ---------------- е·Ҙе…·еҮҪејҸ ---------------- */
function parseShift(t){
  const [a,b] = t.split('~').map(Number);
  return {start:a, end:b};
}
function fmtHM(h){
  const hh = Math.floor(h);
  const mm = Math.round((h-hh)*60);
  return String(hh).padStart(2,'0')+':'+String(mm).padStart(2,'0');
}
function shiftClass(start,end){
  if(end >= 20) return 'evening';
  if(start < 12) return 'morning';
  if(start < 17) return 'midday';
  return 'evening';
}
function shiftLabel(start,end){
  if(end >= 20) return 'жҷҡзҸӯ';
  if(start < 12) return 'ж—©зҸӯ';
  if(start < 17) return 'еҚҲзҸӯ';
  return 'жҷҡзҸӯ';
}

/* ---------------- и®ҖеҸ– Google и©Ұз®—иЎЁ ---------------- */
function updateLabel(text, sub){
  document.getElementById('weekLabel').innerHTML = sub ? `${text}<small>${sub}</small>` : text;
}
function setSync(state,text){
  document.getElementById('syncDot').className = 'sync-dot ' + state;
  document.getElementById('syncText').textContent = text;
}
function showError(msg){
  const box = document.getElementById('errorBox');
  box.innerHTML = msg + `<button id="retryBtn">йҮҚи©Ұ</button>`;
  box.style.display = 'block';
  document.getElementById('retryBtn').onclick = loadAndRender;
}

function periodLabel(){
  if(scope==='day'){
    return {text: WEEKDAYS[(currentDay.getDay()+6)%7], sub: fmtMD(currentDay) + (sameDay(currentDay,new Date())?'гғ»д»ҠеӨ©':'')};
  }
  if(scope==='month'){
    return {text:`${currentMonthAnchor.getFullYear()} е№ҙ ${currentMonthAnchor.getMonth()+1} жңҲ`, sub:`${fmtMD(firstOfMonth(currentMonthAnchor))} вҖ“ ${fmtMD(lastOfMonth(currentMonthAnchor))}`};
  }
  const sunday = sundayOf(currentMonday);
  return {text: sheetNameFor(currentMonday), sub:`${fmtMD(currentMonday)} вҖ“ ${fmtMD(sunday)}`};
}

async function loadAndRender(){
  setSync('loading','и®ҖеҸ–дёӯвҖҰ');
  document.getElementById('errorBox').style.display = 'none';
  try{
    const lbl = periodLabel();
    updateLabel(lbl.text, lbl.sub);

    let start, end, monthAnchorForGrid = null;
    if(scope === 'day'){
      start = end = currentDay;
    } else if(scope === 'month'){
      const monthStart = firstOfMonth(currentMonthAnchor);
      const monthEnd = lastOfMonth(currentMonthAnchor);
      start = mondayOf(monthStart);
      end = addDays(mondayOf(monthEnd), 6);
      monthAnchorForGrid = currentMonthAnchor;
    } else {
      start = currentMonday;
      end = sundayOf(currentMonday);
    }

    const days = await buildDayList(start, end);
    renderToggle();

    if(scope === 'month' && currentView === 'day'){
      renderMonthCalendar(days, monthAnchorForGrid);
    } else if(currentView === 'day'){
      renderDayCardsGeneric(days);
    } else if(scope === 'month'){
      const monthOnly = days.filter(d => d.date.getMonth() === monthAnchorForGrid.getMonth());
      renderPersonStrip(monthOnly);
    } else {
      renderPersonStrip(days);
    }

    setSync('ok', 'е·ІеҗҢжӯҘ В· ' + new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'}));
  } catch(err){
    setSync('err','и®ҖеҸ–еӨұж•—');
    showError('и®ҖеҸ–и©Ұз®—иЎЁжҷӮзҷјз”ҹйҢҜиӘӨ,и«ӢзўәиӘҚе°ҚжҮүеҲҶй ҒеӯҳеңЁ,жҲ–зЁҚеҫҢеҶҚи©ҰгҖӮ');
    console.error(err);
  }
}

/* ---------------- жёІжҹ“ ---------------- */
function renderToggle(){
  const vel = document.getElementById('viewToggle');
  vel.innerHTML = '';
  [['person','дҫқе§“еҗҚ'],['day','дҫқж—Ҙжңҹ']].forEach(([key,label])=>{
    const b = document.createElement('button');
    b.textContent = label;
    if(key===currentView) b.classList.add('active');
    b.onclick = ()=>{ currentView = key; loadAndRender(); };
    vel.appendChild(b);
  });
}

/* дҫқе§“еҗҚжӘўиҰ–пјҡе°Қд»»ж„ҸеӨ©ж•ёпјҲйҖұ=7еӨ©пјҸжңҲ=~30еӨ©пјҸеӨ©=1еӨ©пјүйғҪйҖҡз”ЁпјҢеӨ©ж•ёеӨҡжҷӮеҸҜж©«еҗ‘жҚІеӢ• */
function renderPersonStrip(days){
  const personMap = {};
  days.forEach((d,i)=>{
    d.entries.forEach(e=>{
      if(!personMap[e.name]) personMap[e.name] = new Array(days.length).fill(null);
      personMap[e.name][i] = {start:e.start, end:e.end};
    });
  });
  const names = Object.keys(personMap).sort((a,b)=>{
    const hrsOf = arr => arr.reduce((s,x)=> s + (x? x.end-x.start : 0), 0);
    return hrsOf(personMap[b]) - hrsOf(personMap[a]);
  });

  const cellPx = days.length > 10 ? 54 : null; // и¶…йҒҺ 10 еӨ©пјҲз•¶жңҲпјүж”№з”Ёеӣәе®ҡеҜ¬еәҰпјӢж©«еҗ‘жҚІеӢ•
  const colStyle = cellPx ? `grid-template-columns:repeat(${days.length},${cellPx}px)` : `grid-template-columns:repeat(${days.length},1fr)`;

  let html = '';
  names.forEach(name=>{
    const shifts = personMap[name];
    const hrs = shifts.reduce((s,x)=> s + (x? x.end-x.start : 0), 0);
    const workDays = shifts.filter(Boolean).length;
    const offDays = shifts.length - workDays;

    const inner = `
        <div class="dh-row" style="${colStyle}">
          ${days.map(d=>`<div class="dh"><span class="wd">${DAYS[(d.date.getDay()+6)%7]}</span><span class="dn">${fmtMD(d.date)}</span></div>`).join('')}
        </div>
        <div class="cell-row" style="${colStyle}">
          ${shifts.map(s=>{
            if(!s){
              return `<div class="timecell"><span class="off-x">дј‘</span></div>`;
            }
            const cls = shiftClass(s.start,s.end);
            return `<div class="timecell ${cls}">
              <div class="celltime ${cls}"><b>${shiftLabel(s.start,s.end)}</b>${fmtHM(s.start)}<br>${fmtHM(s.end)}</div>
            </div>`;
          }).join('')}
        </div>`;

    html += `<div class="person">
      <div class="person-title">
        <span class="nm">${name}</span>
        <span class="hrs">дёҠзҸӯ ${workDays} еӨ©гғ»дј‘еҒҮ ${offDays} еӨ©гғ»е…ұ ${hrs.toFixed(1)} е°ҸжҷӮ</span>
      </div>
      ${cellPx ? `<div class="week-strip-scroll">${inner}</div>` : `<div class="week-strip">${inner}</div>`}
    </div>`;
  });

  document.getElementById('board').innerHTML = html || '<div class="day-empty" style="padding:20px 16px;">йҖҷж®өжңҹй–“и©Ұз®—иЎЁе°ҡз„ЎжҺ’зҸӯиіҮж–ҷ</div>';
}

/* йҖҡз”Ёж—Ҙжңҹжё…е–®жёІжҹ“пјҲз”Ёж–јгҖҢдҫқж—ҘжңҹгҖҚжӘўиҰ–пјҢйҖұ/еӨ©зҡҶйҒ©з”Ёпјү*/
function renderDayCardsGeneric(days){
  const today = new Date(); today.setHours(0,0,0,0);
  let html = '';
  days.forEach(d=>{
    const wd = WEEKDAYS[(d.date.getDay()+6)%7];
    const isToday = sameDay(d.date, today);
    html += `<div class="day-card"${isToday?' style="outline:2px solid var(--blue);outline-offset:-1px;"':''}>
      <div class="dtitle">
        <span class="dname">${wd}</span>
        <span class="ddate">${fmtMD(d.date)}${isToday?'гғ»д»ҠеӨ©':''}</span>
        <span class="dcount">${d.entries.length} дәә</span>
      </div>
      <div class="staff-list">
        ${d.noSheet
          ? `<div class="day-empty">жӯӨйҖұе°ҡжңӘе»әз«ӢзҸӯиЎЁ</div>`
          : (d.entries.length ? d.entries.map(e=>{
              const cls = shiftClass(e.start, e.end);
              return `<div class="staff-row ${cls}">
                <span class="snm">${e.name}</span>
                <span class="slabel">${shiftLabel(e.start, e.end)}</span>
                <span class="stime">${fmtHM(e.start)} вҖ“ ${fmtHM(e.end)}</span>
              </div>`;
            }).join('') : `<div class="day-empty">жң¬ж—Ҙз„ЎжҺ’зҸӯ</div>`)}
      </div>
    </div>`;
  });
  document.getElementById('board').innerHTML = html || '<div class="day-empty" style="padding:20px 16px;">жІ’жңүиіҮж–ҷ</div>';
}

/* ---- з•¶жңҲпјҡGoogle иЎҢдәӢжӣҶйўЁж јзҡ„жңҲжӣҶж јз·ҡпјҢж је…§зӣҙжҺҘйЎҜзӨәе§“еҗҚ/жҷӮй–“ ---- */
function compactTime(h){
  return (h % 1 === 0) ? String(Math.floor(h)) : h.toFixed(1);
}

function renderMonthCalendar(days, monthAnchor){
  const today = new Date(); today.setHours(0,0,0,0);
  const targetMonth = monthAnchor.getMonth();

  let html = `<div class="month-wrap">
    <div class="month-head-row">${DAYS.map(w=>`<span>${w}</span>`).join('')}</div>
    <div class="month-grid">`;

  days.forEach(d=>{
    const isPad = d.date.getMonth() !== targetMonth;
    const isToday = sameDay(d.date, today);
    const entriesHtml = d.noSheet
      ? ''
      : d.entries.map(e=>{
          const cls = shiftClass(e.start, e.end);
          return `<div class="month-entry ${cls}">
            <span class="n">${e.name}</span>
            <span class="t">${compactTime(e.start)}-${compactTime(e.end)}</span>
          </div>`;
        }).join('');
    html += `<div class="month-cell${isPad?' pad':''}${isToday?' today':''}">
      <span class="mnum">${d.date.getDate()}</span>
      <div class="month-entries">${entriesHtml}</div>
    </div>`;
  });

  html += `</div></div>`;
  document.getElementById('board').innerHTML = html;
}

function renderFooter(){
  document.getElementById('footerNote').textContent = '';
}

function renderAll(){
  loadAndRender();
}

/* ---------------- дёҠдёҖеҖӢпјҸдёӢдёҖеҖӢпјҲдёүзЁ®зҜ„еңҚйҖҡз”Ёпјү ---------------- */
function prevPeriod(){
  if(scope==='month'){ currentMonthAnchor.setMonth(currentMonthAnchor.getMonth()-1); }
  else if(scope==='day'){ currentDay = addDays(currentDay,-1); }
  else { currentMonday = addDays(currentMonday,-7); }
  loadAndRender();
}
function nextPeriod(){
  if(scope==='month'){ currentMonthAnchor.setMonth(currentMonthAnchor.getMonth()+1); }
  else if(scope==='day'){ currentDay = addDays(currentDay,1); }
  else { currentMonday = addDays(currentMonday,7); }
  loadAndRender();
}

/* ---------------- дәӢд»¶з¶Ғе®ҡ ---------------- */
function renderScopeToggle(){
  const el = document.getElementById('scopeToggle');
  el.innerHTML = '';
  [['week','йҖұ'],['month','жңҲ'],['day','еӨ©']].forEach(([key,label])=>{
    const b = document.createElement('button');
    b.textContent = label;
    if(key===scope) b.classList.add('active');
    b.onclick = ()=>{
      scope = key;
      // еҲҮжҸӣзҜ„еңҚжҷӮй җиЁӯеӣһеҲ°гҖҢз•¶йҖұпјҸз•¶жңҲпјҸз•¶еӨ©гҖҚ
      if(scope==='week') currentMonday = mondayOf(new Date());
      if(scope==='month') currentMonthAnchor = firstOfMonth(new Date());
      if(scope==='day') { const d=new Date(); d.setHours(0,0,0,0); currentDay = d; }
      renderScopeToggle();
      loadAndRender();
    };
    el.appendChild(b);
  });
}

document.getElementById('refreshBtn').onclick = ()=>{ weekCache = {}; loadAndRender(); };
document.getElementById('prevBtn').onclick = prevPeriod;
document.getElementById('nextBtn').onclick = nextPeriod;
document.getElementById('todayBtn').onclick = ()=>{
  currentMonday = mondayOf(new Date());
  currentMonthAnchor = firstOfMonth(new Date());
  const d=new Date(); d.setHours(0,0,0,0); currentDay = d;
  loadAndRender();
};

/* ---------------- е·ҰеҸіж»‘еӢ•еҲҮжҸӣдёҠдёҖ/дёӢдёҖжңҹ ---------------- */
(function(){
  let sx=0, sy=0, scrollLock=null;
  document.addEventListener('touchstart', e=>{
    const t = e.touches[0];
    sx = t.clientX; sy = t.clientY;
    scrollLock = e.target.closest('.week-strip-scroll');
  }, {passive:true});
  document.addEventListener('touchend', e=>{
    if(scrollLock) return; // и®“е…§йғЁж©«еҗ‘жҚІеӢ•пјҲз•¶жңҲдҫқе§“еҗҚпјүе„Әе…ҲйҒӢдҪңпјҢдёҚжҗ¶жүӢеӢў
    const t = e.changedTouches[0];
    const dx = t.clientX - sx, dy = t.clientY - sy;
    if(Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.5){
      if(dx < 0) nextPeriod(); else prevPeriod();
    }
  }, {passive:true});
})();

renderScopeToggle();
loadAndRender();
setInterval(()=>{ weekCache = {}; loadAndRender(); }, AUTO_REFRESH_MS);
</script>
